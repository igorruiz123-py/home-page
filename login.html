<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBridge</title>
    <link rel="icon" type="image/png" href="assets/user_auth.png">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <main class="main-content">
        <section class="sign-in">
            <div class="go-back-button">
                <a href="index.html">
                    <button href="index.html" id="button" name="button">Voltar</button>
                </a>
            </div>
            <div class="sign-in-content">
                <header>
                    <h1 id="welcome-back">Bem vindo de volta!</h1>
                </header>
                <p id="paragraph-welcome-back">Para se manter conectado conosco, faça o login abaixo.</p>
                <form>
                    <label>
                        <button id="button" name="button">Entrar</button>
                    </label>
                </form>
            </div>
        </section>
        <section class="sign-up">
                <div class="sign-up-content">
                    <form>
                        <section>
                            <header>
                                <h1 id="title-create-account">Criar Conta</h1>
                            </header>
                            <p id="create-account-paragraph">Use seu E-mail para a criação da conta</p>
                            <div class="registration">
                                <label>
                                    <div class="name">
                                        <i class="fa-solid fa-user"></i>
                                        <input id="name-input" type="text" placeholder="Nome" name="name-input">
                                    </div>
                                    <div class="email">
                                        <i class="fa-solid fa-at"></i>
                                        <input id="email-input" type="text" placeholder="E-mail" name="email-input">
                                    </div>
                                    <div class="password">
                                        <i class="fa-solid fa-unlock"></i>
                                        <input id="password-input" type="password" placeholder="Crie uma senha" name="password-input">
                                    </div>
                                </label>
                                <button id="button">Criar</button>
                            </div>
                        </section>
                    </form>
                </div>
        </section>
    </main>
</body>
</html>
